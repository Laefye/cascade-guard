services:
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_BASE_PATH: ""
    ports:
      - "3000:3000"
    environment:
      - BOT_PUBLIC_KEY=
      - BOT_ENDPOINT=
      - YANDEX_CAPTCHA_SECRET_KEY=
      - KEYPAIR_DIR=/keypair
    volumes:
      - ./keypair-web:/keypair
    